user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ロギング
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # LLM推論用: 大きなリクエスト・レスポンスに対応
    client_max_body_size 100M;
    proxy_read_timeout    300s;
    proxy_connect_timeout  30s;
    proxy_send_timeout    300s;

    # gzip（テキストレスポンス圧縮）
    gzip on;
    gzip_types text/plain application/json;
    gzip_min_length 1000;

    # ── アップストリーム定義 ──────────────────────────────────────────────────
    upstream litellm_backend {
        server litellm:4000;
        keepalive 32;
    }

    upstream vllm_primary {
        server host.docker.internal:8080;
        keepalive 16;
    }

    upstream vllm_secondary {
        server host.docker.internal:8081;
        keepalive 16;
    }

    # ── メインサーバー (port 80) ──────────────────────────────────────────────
    server {
        listen 80;
        server_name 192.168.50.112 localhost;

        # ── OpenAI互換 API → LiteLLM ────────────────────────────────────────
        location /v1/ {
            proxy_pass         http://litellm_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;   # ストリーミング応答のため必須
            proxy_cache        off;
        }

        # ── ヘルスチェックエンドポイント ──────────────────────────────────────
        location /health {
            proxy_pass         http://litellm_backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── vLLM Primary 直接アクセス ─────────────────────────────────────────
        location /primary/ {
            rewrite            ^/primary/(.*)$ /$1 break;
            proxy_pass         http://vllm_primary;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_buffering    off;
        }

        # ── vLLM Secondary 直接アクセス ───────────────────────────────────────
        location /secondary/ {
            rewrite            ^/secondary/(.*)$ /$1 break;
            proxy_pass         http://vllm_secondary;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_buffering    off;
        }

        # ── ルートページ ──────────────────────────────────────────────────────
        location / {
            return 200 '{"service":"cocoro-llm-server","status":"running","endpoint":"/v1/"}';
            add_header Content-Type application/json;
        }
    }
}
