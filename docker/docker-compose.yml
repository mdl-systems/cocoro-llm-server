services:
  # ── LiteLLM Proxy (OpenAI互換 APIゲートウェイ) ──────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "8000:4000"   # ホスト:8000 → コンテナ:4000
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
      - /var/log/cocoro-llm:/var/log/cocoro-llm
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_LOG: "INFO"
    command: >
      --config /app/config.yaml
      --port 4000
      --num_workers 4
      --detailed_debug
    # vLLMはホストで動くため host.docker.internal 経由でアクセス
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - cocoro-net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ── Prometheus (メトリクス収集) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cocoro-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Grafana (ダッシュボード) ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://192.168.50.112:3000"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/llm_metrics.json"
    depends_on:
      - prometheus
    networks:
      - cocoro-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── Nginx (リバースプロキシ) ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - litellm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cocoro-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

# ── ボリューム ────────────────────────────────────────────────────────────────
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── ネットワーク ──────────────────────────────────────────────────────────────
networks:
  cocoro-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
