# vLLM Secondary (Qwen 3.5 32B) 設定
# このファイルは参照用です。実際の起動パラメータは start_secondary.sh で管理します。

model: /models/qwen35-32b
served_model_name: qwen-32b
host: 0.0.0.0
port: 8081

# GPU設定（Primaryと同一GPUを共有）
gpu_memory_utilization: 0.23       # 22GB / 96GB
tensor_parallel_size: 1
dtype: bfloat16

# コンテキスト・バッチ設定
max_model_len: 16384               # 16K（Qwenは16K推奨）
max_num_seqs: 16
max_num_batched_tokens: 4096

# Prefill最適化
enable_chunked_prefill: true

# ロギング
disable_log_requests: true

# 信頼設定
trust_remote_code: true

# Qwen 3.5 32B メモ:
# - Qwen 3.5 32Bはdenseモデル（MoEではない）
# - --enable-expert-parallel は不要
# - 日本語性能が高く、短文・会話に最適
# - max_model_len は16384が安定（32768にするとKVキャッシュ不足の恐れ）
